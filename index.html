<style>

/* Título */
h1 {

    font-size: 22px;
    margin-bottom: 15px;
}

/* MENÚ */
/* MENÚ VERTICAL */

.menu-vertical{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:30px;

    align-items:center;
}

.menu-vertical button{

    width:100%;
max-width:500px;

    padding:16px;

    border:none;
    border-radius:14px;

    background:#ececec;
    color:#333;

    font-size:16px;
    font-weight:600;

    text-align:left;

    transition:0.2s;
}

.menu-vertical button.activo{
    background:#2563eb;
    color:white;
}
/* PREGUNTAS */
.pregunta {
    margin-bottom: 22px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #eee;
}

/* Mejor lectura */
.pregunta p {
    font-size: 16px;
    font-weight: bold;
}

/* Opciones */
label {
    display: block;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    background: #f9f9f9;
    font-size: 15px;
}

/* RADIO MÁS GRANDE */
input[type="radio"] {
    transform: scale(1.4);
    margin-right: 10px;
}

/* CORRECCIÓN */
.correcta { background: #d1fae5; }
.incorrecta { background: #fee2e2; }

.respuesta-correcta {
    margin-top: 10px;
    font-weight: bold;
    color: #16a34a;
    font-size: 14px;
}

/* BOTÓN */
.boton-container {
    text-align: center;
    margin: 30px 0;
}

button {
    width: 100%;
    max-width: 350px;
    padding: 16px;
    font-size: 18px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 12px;
}

/* RESULTADO */
.resultado {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    white-space: pre-line;
}

/* 🔥 EXTRA SOLO MÓVIL */
@media (max-width: 600px) {

    h1 {
        font-size: 20px;
    }

    .menu button {
        font-size: 13px;
        padding: 8px 10px;
    }

    .pregunta p {
        font-size: 15px;
    }

    label {
        font-size: 14px;
    }

    button {
        font-size: 17px;
    }
}
</style>
</head>

function cargarAsignatura(nombre, boton) {
    asignaturaActual = nombre;

    document.querySelectorAll(".menu-vertical button").forEach(b => b.classList.remove("activo"));
    boton.classList.add("activo");

    document.getElementById("mensajeInicio").style.display = "none";
    document.getElementById("botonCorregir").style.display = "block";

    const form = document.getElementById("test");
    form.innerHTML = "";
    document.getElementById("resultado").innerText = "";

    const { preguntas } = datos[nombre];

    preguntas.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "pregunta";
        div.id = "pregunta"+i;

        let html = `<p>${i+1}. ${p[0]}</p>`;
        p[1].forEach(op => {
            const letra = op.charAt(0);
            html += `<label><input type="radio" name="q${i}" value="${letra}"> ${op}</label>`;
        });

        div.innerHTML = html;
        form.appendChild(div);
    });
}

function corregir() {
    const { preguntas, respuestas } = datos[asignaturaActual];
    let nota = 0;

    preguntas.forEach((p, i) => {
        const div = document.getElementById("pregunta"+i);
        const seleccion = document.querySelector(`input[name="q${i}"]:checked`);

        div.classList.remove("correcta","incorrecta");

        if (seleccion && seleccion.value === respuestas[i]) {
            nota++;
            div.classList.add("correcta");
        } else {
            div.classList.add("incorrecta");
        }

        if (!div.querySelector(".respuesta-correcta")) {
            const texto = p[1].find(op => op.startsWith(respuestas[i]));
            const info = document.createElement("div");
            info.className = "respuesta-correcta";
            info.innerText = "Respuesta correcta: " + texto;
            div.appendChild(info);
        }
    });

    let porcentaje = (nota / preguntas.length) * 100;
    let mensaje = "";

    if (porcentaje >= 90) {
        mensaje = "🎉 ¡Enhorabuena! Lo tienes súper controlado. Si el examen es así, vas sobrada.";
    } else if (porcentaje >= 75) {
        mensaje = "💪 Muy bien, se nota que lo llevas trabajado. Un repasito más y te sales.";
    } else if (porcentaje >= 60) {
        mensaje = "👍 Vas bien, pero aún se te escapan algunas. Un empujón más y listo.";
    } else if (porcentaje >= 40) {
        mensaje = "😅 Casi… pero no. Tienes base, pero toca apretar un poco más.";
    } else {
        mensaje = "🚨 Uf… aquí hay que ponerse en serio. Poco a poco, que puedes mejorar mucho.";
    }

    document.getElementById("resultado").innerText =
    `Resultado: ${nota}/${preguntas.length}\n\n${mensaje}`;
}

</script>
